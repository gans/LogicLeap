services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: logicleap
      POSTGRES_USER: logicleap
      POSTGRES_PASSWORD: logicleap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logicleap -d logicleap"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      LOGICLEAP_DATABASE_URL: postgresql+psycopg://logicleap:logicleap@postgres:5432/logicleap
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 5s
      timeout: 3s
      retries: 20

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["python", "-m", "logicleap.mcp.server"]
    environment:
      LOGICLEAP_DATABASE_URL: postgresql+psycopg://logicleap:logicleap@postgres:5432/logicleap
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8001),2); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
