name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Verify dependency locks
        run: make verify-locks
      - name: Build and start stack
        run: docker compose up --build --wait
      - name: Backend tests
        run: docker compose run --rm backend pytest
      - name: Backend lint and types
        run: |
          docker compose run --rm backend ruff check .
          docker compose run --rm backend mypy src
      - name: Frontend tests, types, and build
        run: |
          docker compose run --rm frontend npm test
          docker compose run --rm frontend npm run typecheck
          docker compose run --rm frontend npm run build
      - name: Migration is current
        run: docker compose run --rm backend alembic check
      - name: Dependency audits
        run: |
          make audit-python
          make audit-node
      - name: Build final images
        run: make build-images
      - name: Trivy repository and configuration scans
        run: |
          make scan-fs
          make scan-config
      - name: Trivy final image scans
        run: make scan-images
      - name: Logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop stack
        if: always()
        run: docker compose down -v
